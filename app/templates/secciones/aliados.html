{% extends 'secciones/base.html' %}
{% block titulo %} BSR Valladolid {% endblock %}
{% block contenido %}
<div class="team-header">
  <h1 class="responsive-title">BSR Valladolid</h1>
  <img src="/static/img/aliados_sf.png" alt="BSR Valladolid" class="responsive-logo" />
</div>
<section class="container-lg seccion_deportes">
  <diV class="calend_deportes">
    <div class="shadow-lg p-3">
      <div class="row g-3 align-items-center">
        <div class="col-12 text-center">
          <h2 class="text_uemc">Superliga BSR</h2>
        </div>
        <div class="tu-contenedor-h5">
            <a href="/admin/equipos_basket/calendario_aliados" class="text-decoration-none text-white">
              <h5 class="small-option fw-bold">Calendario Ind.</h5>
            </a>
            <a href="/admin/equipos_basket/resultados_aliados" class="text-decoration-none text-white">
              <h5 class="small-option fw-bold">Resultados</h5>
            </a>
            <a href="/admin/equipos_basket/clasif_aliados" class="text-decoration-none text-white">
              <h5 class="small-option fw-bold">Clasificaciones</h5>
            </a>
            <a href="/admin/aliados/historial" class="text-decoration-none text-white">
              <h5 class="small-option fw-bold">Historial</h5>
            </a>
        </div>
      </div>
    </div>
    <div class="shadow-lg p-3 mb-2">
      <div class="row g-3 align-items-center">
        <div class="col-12 text-center mt-2">
          <a href="/admin/copas_aliados" class="text-decoration-none"><h2 class="text_uemc pt-3">COPA DEL REY</h2></a>
        </div>
      </div>
    </div>
    <div class="shadow-lg p-3 mb-2">
      <div class="row g-3 align-items-center">
        <div class="col-12 text-center mt-2">
          <a href="/admin/playoffs_aliados" class="text-decoration-none"><h2 class="text_uemc pt-3">FINAL-FOUR</h2></a>
        </div>
      </div>
    </div>
    <div class="shadow-lg p-3 mb-2">
      <div class="row g-3 align-items-center">
        <div class="col-12 text-center mt-2">
          <h2 class="text_uemc">EUROCUP</h2>
        </div>
        <div class="tu-contenedor-h5">
          <a href="/admin/aliados_eurocup/" class="text-decoration-none text-white"><h5 class="small-option fw-bold">EuroCup 1 - Grp-A</h5></a>
          <a href="/admin/aliados_eurocup2" class="text-decoration-none text-white"><h5 class="small-option fw-bold">Eurocup 2 - Final</h5></a>
        </div>
      </div>
    </div>
  </diV>
</section>
{% endblock %}
