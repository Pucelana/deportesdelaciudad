<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{% block title %}Deportes de la Ciudad{% endblock %}</title>

  <!-- SEO -->
  <meta name="description" content="{% block description %}Resultados, clasificaciones y análisis deportivos.{% endblock %}">
  <meta name="keywords" content="{% block keywords %}deporte, Valladolid, resultados, clasificaciones{% endblock %}">
  <meta name="author" content="eldeportedelaciudad">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="{{ request.url }}">

  <!-- OPEN GRAPH -->
  <meta property="og:title" content="{% block og_title %}Deportes de la Ciudad{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Resultados y análisis deportivos{% endblock %}">
  <meta property="og:image" content="{% block og_image %}https://deportesdelaciudad.onrender.com/static/img/logo-deportes2.png{% endblock %}">
  <meta property="og:url" content="{{ request.url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="eldeportedelaciudad">

  <!-- TWITTER -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block twitter_title %}Deportes de la Ciudad{% endblock %}">
  <meta name="twitter:description" content="{% block twitter_description %}Resultados y análisis deportivos{% endblock %}">
  <meta name="twitter:image" content="{% block twitter_image %}https://deportesdelaciudad.onrender.com/static/img/logo-deportes2.png{% endblock %}">

  <!-- PWA -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#050505">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <!-- ICONOS -->
  <link rel="icon" href="{{ url_for('static', filename='img/logo-deportes2.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo-deportes2.png') }}">

  <!-- CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/estilo.css') }}" rel="stylesheet">
</head>

<body class="body_secciones">
  <main class="container-lg mb-3">  
  {% block contenido %}  {% endblock %}
  </main>
  <footer class="container-fluid footer-seccion">
      <div class="row align-items-center text-center">
        <div class="col-12 col-md-6 mb-2 mb-md-0">
          <a>
            <h5 class="text-white fw-bold text-analisis mb-0 fs-4">deportesdeslaciudad &copy; 2026</h5>
          </a>
        </div>
        <div class="col-12 col-md-6">
          <img src="/static/img/logo-deportes2.png" class="img-fluid logo-footer" alt="deportesdelaciudad">
        </div>
      </div>
    </footer>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <!-- Bootstrap JavaScript Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"
    integrity="sha384-oBqDVmMz9ATKxIep9tiCxS/Z9fNfEXiDAYTujMAeBAsjFuCZSmKbSSUnQlmh/jp3" crossorigin="anonymous">
    </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/js/bootstrap.min.js"
    integrity="sha384-7VPbUDkoPSGFnVtYi0QogXtr74QeVeeIs99Qfg5YCF+TidwNdjvaKZX19NZ/e6oz" crossorigin="anonymous">
    </script>
  <!--<script src="/static/js/script.js"></script>-->
  <!--<script src="/static/js/proteccion-datos.js"></script>-->
  <script src="/static/js/num_caracteres.js"></script>
  {% block scripts %}  {% endblock %}
</body>
</html>
